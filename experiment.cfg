[paths]
dataset_path = /home/student_server/Qtt/NAFNet/data
# Set this to the directory that contains test_blur/, test_sharp/, and test_mask/
blind_dataset_path = 
ckpt_dir = /home/student_server/Qtt/PromptIR/ckpt
output_path = /home/student_server/Qtt/PromptIR/output

[train]
cuda = 0
epochs = 200
batch_size = 4
num_gpus = 1
# use_blind_pairs should be True or False (string); current train.py reads it as bool-like
use_blind_pairs = True
# freeze encoder/front-half and fine-tune decoder/back-half more gently
freeze_encoder = True
encoder_lr = 1e-6
decoder_lr = 1e-5
# if you have a full Lightning checkpoint (with optimizer state), put it here; leave blank to auto-detect ckpt_dir/last.ckpt
resume_ckpt_path = 
# gradient clipping norm
grad_clip_val = 1.0
# optional
wblogger = promptir

[validation]
val_interval = 5
val_blur_dir = /home/student_server/Qtt/NAFNet/data/val_blur
val_sharp_dir = /home/student_server/Qtt/NAFNet/data/val_sharp
best_model_path = /home/student_server/Qtt/PromptIR/best_model.ckpt

[test]
cuda = 0
mode = 4
ckpt_name = model.ckpt
